<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">
  <title>Buy this Product</title>
</head>
<body>


  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3 px-3">
      <div class="container">

        <!-- Logo -->
        <a class="navbar-brand fs-4" href="index.html">TrendHub</a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Desktop Navbar -->
        <div class="d-none d-lg-flex align-items-center w-100">

          <ul class="navbar-nav mx-auto">
            <li class="nav-item"><a class="nav-link active mx-2" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link mx-2" href="womenClothing.html">Women</a></li>
            <li class="nav-item"><a class="nav-link mx-2" href="kidsClothing.html">Kids</a></li>
            <li class="nav-item"><a class="nav-link mx-2" href="menClothing.html">Men</a></li>
          </ul>

          <!-- Desktop Search -->
          <form class="d-flex">
            <div class="input-group">
              <input class="form-control" type="search" placeholder="Search">

              <button class="btn btn-outline-light" type="submit">
                <i class="fa-solid fa-magnifying-glass"></i>
              </button>
            </div>
          </form>
        </div>
      </div>
    </nav>
  </header>

  <!-- Mobile Sidebar -->
  <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="mobileMenu">

    <div class="offcanvas-header">
      <h5 class="offcanvas-title">TrendHub</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">
      <ul class="navbar-nav">
        <li class="nav-item mb-2"><a class="nav-link active" href="index.html">Home</a></li>
        <li class="nav-item mb-2"><a class="nav-link" href="womenClothing.html">Women</a></li>
        <li class="nav-item mb-2"><a class="nav-link" href="kidsClothing.html">Kids</a></li>
        <li class="nav-item mb-2"><a class="nav-link" href="menClothing.html">Men</a></li>
      </ul>

      <!-- Mobile Search -->
      <form class="mt-4">
        <div class="input-group">
          <input type="search" class="form-control" placeholder="Search">
          <button class="btn btn-outline-light" type="submit">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>
      </form>
    </div>
  </div>

  <div class="place-order"></div>
  <div class="msg">
    <h5 id="cartMsg" class="wishlistMsg"></h5>
    <div id="notification"></div>
  </div>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
